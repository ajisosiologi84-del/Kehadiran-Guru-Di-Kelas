<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 470" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="40%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>
    <linearGradient id="header-phone-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="btn-orange-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="check-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#ea580c" />
    </linearGradient>
    <linearGradient id="hand-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fed7aa" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
    
    <!-- Shadow filters -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="5" stdDeviation="4" flood-opacity="0.35"/>
    </filter>
    <filter id="phone-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="10" dy="20" stdDeviation="15" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Background Canvas -->
  <rect width="1000" height="470" fill="url(#bg-grad)" rx="24" />

  <!-- 2. Stylized School Corridor Background Elements (Blurred Vectors) -->
  <g opacity="0.15">
    <!-- Corridor Pillars -->
    <path d="M 0 0 L 250 0 L 220 470 L 0 470 Z" fill="#64748b" />
    <path d="M 280 0 L 380 0 L 340 470 L 260 470 Z" fill="#475569" />
    <path d="M 400 0 L 460 0 L 420 470 L 370 470 Z" fill="#334155" />
    <path d="M 480 0 L 520 0 L 490 470 L 460 470 Z" fill="#1e293b" />
    
    <!-- Horizon lines -->
    <line x1="220" y1="470" x2="600" y2="280" stroke="#94a3b8" stroke-width="2" />
    <line x1="250" y1="0" x2="600" y2="280" stroke="#94a3b8" stroke-width="1" />
    
    <!-- Ruang Guru sign board silhouette -->
    <rect x="520" y="50" width="130" height="40" rx="6" fill="#1e3a8a" />
    <text x="585" y="74" fill="#ffffff" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle">RUANG GURU</text>
    
    <!-- Stylized student silhouettes -->
    <circle cx="280" cy="260" r="15" fill="#94a3b8" />
    <path d="M 265 275 C 265 275 250 330 250 420 L 310 420 L 295 275 Z" fill="#94a3b8" />
    
    <circle cx="340" cy="245" r="12" fill="#cbd5e1" />
    <path d="M 328 257 C 328 257 315 300 315 390 L 365 390 L 352 257 Z" fill="#cbd5e1" />
    
    <circle cx="410" cy="235" r="10" fill="#94a3b8" />
    <path d="M 400 245 C 400 245 390 290 390 360 L 430 360 L 420 245 Z" fill="#94a3b8" />
  </g>

  <!-- Decorative Orange and Blue ambient light leaks -->
  <circle cx="100" cy="100" r="180" fill="#f97316" opacity="0.1" filter="url(#glow)" />
  <circle cx="850" cy="250" r="220" fill="#3b82f6" opacity="0.15" filter="url(#glow)" />

  <!-- 3. Left Side Content (Branding & Logo) -->
  <g transform="translate(60, 45)">
    <!-- Logo Icon Group -->
    <g transform="translate(0, 10)">
      <!-- Main Circular Badge -->
      <circle cx="80" cy="80" r="75" fill="#ffffff" filter="url(#shadow)" />
      
      <!-- Inner blue circular frame -->
      <circle cx="80" cy="80" r="62" fill="#1e3a8a" />
      <circle cx="80" cy="80" r="58" fill="#1e40af" />
      
      <!-- Wave design lines -->
      <path d="M 35 90 C 35 90 60 125 110 115 C 120 110 128 100 132 90" fill="none" stroke="#3b82f6" stroke-width="4" stroke-linecap="round" />
      <path d="M 42 98 C 42 98 65 131 105 124" fill="none" stroke="#60a5fa" stroke-width="3" stroke-linecap="round" />

      <!-- Waving Hand Illustration -->
      <g transform="translate(42, 42) scale(0.9)">
        <!-- Blue outline hand -->
        <path d="M 25 50 C 25 50 12 35 20 20 C 25 10 35 15 35 25 C 35 15 45 10 50 20 C 55 10 65 15 63 28 C 68 15 78 20 73 35 C 70 42 62 48 55 52 L 50 68 L 28 68 Z" fill="url(#hand-grad)" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round" />
        <!-- Hand palm lines -->
        <path d="M 35 48 C 38 43 45 43 48 48" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" />
        <path d="M 30 54 C 35 49 48 49 53 54" fill="none" stroke="#f97316" stroke-width="1.5" stroke-linecap="round" />
        <!-- Sound/wave signals from hand -->
        <path d="M 75 12 C 81 18 81 28 75 34" fill="none" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" />
        <path d="M 83 5 C 92 14 92 28 83 37" fill="none" stroke="#fdba74" stroke-width="2" stroke-linecap="round" />
      </g>
      
      <!-- Checkmark Design -->
      <path d="M 90 75 L 115 100 L 160 55" fill="none" stroke="url(#check-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
      <path d="M 90 75 L 115 100 L 160 55" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
      
      <!-- Small "SG" badge -->
      <circle cx="128" cy="115" r="16" fill="#f97316" stroke="#ffffff" stroke-width="2" />
      <text x="128" y="120" fill="#ffffff" font-family="'Inter', sans-serif" font-size="11" font-weight="900" text-anchor="middle">SG</text>
    </g>

    <!-- App Name -->
    <text x="0" y="215" fill="#ffffff" font-family="'Inter', sans-serif" font-size="46" font-weight="900" letter-spacing="-1">SAPA Guru</text>
    
    <!-- Subtitles & Description -->
    <text x="0" y="255" fill="#f1f5f9" font-family="'Inter', sans-serif" font-size="17" font-weight="500" opacity="0.95">Selamat Pagi, Bapak/Ibu .....</text>
    <text x="0" y="285" fill="#ea580c" font-family="'Inter', sans-serif" font-size="16" font-weight="800">Senin 13 Juli 2026 | 07.00</text>
    
    <!-- Location Badge -->
    <g transform="translate(0, 310)">
      <rect width="320" height="36" rx="10" fill="#334155" opacity="0.6" stroke="#475569" stroke-width="1"/>
      <text x="15" y="23" fill="#cbd5e1" font-family="'Inter', sans-serif" font-size="12" font-weight="700">Lokasi : SMA Negeri 2 Kota Pasuruan</text>
    </g>
    
    <text x="0" y="375" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="11" font-weight="500" width="350">
      *Sistem Absensi &amp; Pelaporan Terintegrasi Realtime
    </text>
  </g>

  <!-- 4. Right Side Content (Floating Smartphone Mockup held by hand) -->
  <g transform="translate(540, -10)">
    <!-- Ambient Phone Glow -->
    <rect x="40" y="40" width="280" height="470" rx="42" fill="#3b82f6" opacity="0.08" filter="url(#glow)" />
    
    <!-- Shadow for hand & phone -->
    <g filter="url(#phone-shadow)">
      <!-- Outer Smartphone Frame -->
      <rect x="48" y="45" width="264" height="455" rx="36" fill="#020617" />
      <rect x="52" y="49" width="256" height="447" rx="32" fill="#0f172a" stroke="#1e293b" stroke-width="2" />
      
      <!-- Inner Screen Area -->
      <rect x="56" y="53" width="248" height="439" rx="28" fill="#f8fafc" />
    </g>

    <!-- Phone Screen Content -->
    <g transform="translate(56, 53)">
      <clipPath id="screen-clip">
        <rect width="248" height="439" rx="28" />
      </clipPath>
      
      <g clip-path="url(#screen-clip)">
        <!-- A. Phone Header Status Bar -->
        <rect width="248" height="24" fill="#1e3a8a" opacity="0.95" />
        <text x="22" y="15" fill="#ffffff" font-family="sans-serif" font-size="8" font-weight="bold">07:00</text>
        <!-- Icons (Wifi, Battery, Signal) -->
        <path d="M 210 11 L 216 11 L 216 15 L 210 15 Z" fill="#ffffff" opacity="0.8" />
        <rect x="220" y="9" width="12" height="7" rx="1.5" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.8" />
        <rect x="221" y="11" width="8" height="3" fill="#ffffff" opacity="0.8" />
        <path d="M 198 16 L 202 16 L 202 14 L 198 14 Z M 203 16 L 207 16 L 207 11 L 203 11 Z" fill="#ffffff" opacity="0.8" />

        <!-- B. App Header Area inside phone -->
        <rect y="24" width="248" height="110" fill="url(#header-phone-grad)" />
        
        <!-- App branding in phone header -->
        <circle cx="36" cy="64" r="16" fill="#ffffff" />
        <!-- Small Waving Hand Icon inside phone circular logo -->
        <path d="M 28 66 C 28 66 24 58 30 55 C 33 53 36 57 36 61 C 38 56 42 57 41 62" fill="none" stroke="#1e40af" stroke-width="1.5" stroke-linecap="round" />
        <path d="M 33 64 L 41 58 L 44 64" fill="none" stroke="#ea580c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="45" cy="71" r="4" fill="#ea580c" />
        
        <text x="60" y="60" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="900">SAPA Guru</text>
        <text x="60" y="73" fill="#bfdbfe" font-family="'Inter', sans-serif" font-size="7.5" font-weight="700">Selamat Pagi, Bapak/Ibu .....</text>
        <text x="60" y="83" fill="#93c5fd" font-family="'Inter', sans-serif" font-size="7" font-weight="500">Senin 13 Juli 2026 | 07.00</text>
        <text x="60" y="93" fill="#ffffff" font-family="'Inter', sans-serif" font-size="6.5" font-weight="600" opacity="0.9">Lokasi: SMA Negeri 2 Kota Pasuruan</text>

        <!-- Notification Bell Icon in phone header -->
        <circle cx="218" cy="62" r="10" fill="#ffffff" opacity="0.1" />
        <path d="M 215 65 L 221 65 C 221 65 220 64 220 63 L 220 59 C 220 57 218 56 216 57 L 216 56 C 216 55 215 55 215 56 L 215 57 C 213 58 213 60 213 61" fill="none" stroke="#ffffff" stroke-width="1" />
        <circle cx="218" cy="53" r="3" fill="#ef4444" />
        <text x="218" y="55.5" fill="#ffffff" font-family="sans-serif" font-size="4" font-weight="bold" text-anchor="middle">1</text>

        <!-- C. Main Dashboard Widget (95% Hadir) -->
        <g transform="translate(10, 115)" filter="url(#shadow)">
          <rect width="228" height="52" rx="10" fill="#ffffff" />
          <text x="12" y="16" fill="#1e293b" font-family="'Inter', sans-serif" font-size="8" font-weight="900">Status Kehadiran Hari Ini (Senin, 13 Jul)</text>
          
          <!-- Attendance percentage bar -->
          <rect x="10" y="24" width="208" height="20" rx="6" fill="#1e40af" />
          <text x="114" y="37" fill="#ffffff" font-family="'Inter', sans-serif" font-size="10" font-weight="900" text-anchor="middle">95% Hadir <tspan font-size="7.5" font-weight="500" fill="#93c5fd">(100/105 Guru)</tspan></text>
        </g>

        <!-- D. Multi-column Widget Section (Check In & Rekan) -->
        <!-- Column 1: Lapor Kehadiran -->
        <g transform="translate(10, 178)" filter="url(#shadow)">
          <rect width="110" height="152" rx="10" fill="#ffffff" />
          <text x="10" y="18" fill="#1e293b" font-family="'Inter', sans-serif" font-size="7.5" font-weight="900">Lapor Kehadiran</text>
          
          <!-- CHECK-IN button -->
          <g transform="translate(10, 26)">
            <rect width="90" height="26" rx="13" fill="url(#btn-orange-grad)" />
            <text x="45" y="16.5" fill="#ffffff" font-family="'Inter', sans-serif" font-size="9.5" font-weight="900" text-anchor="middle" letter-spacing="0.5">CHECK-IN</text>
          </g>

          <text x="10" y="68" fill="#475569" font-family="'Inter', sans-serif" font-size="6.5" font-weight="500" width="90">
            <tspan x="10" dy="0">Kolektif &amp; Transparan</tspan>
            <tspan x="10" dy="10">Ambil Selfie &amp; Lokasi</tspan>
          </text>
          
          <!-- Check in illustration vector -->
          <g transform="translate(25, 96)" opacity="0.9">
            <circle cx="30" cy="22" r="16" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1" />
            <circle cx="30" cy="18" r="5" fill="#3b82f6" />
            <path d="M 20 32 C 20 26 40 26 40 32 Z" fill="#3b82f6" />
            <!-- Camera lens style overlay -->
            <rect x="36" y="22" width="16" height="11" rx="2" fill="#ea580c" stroke="#ffffff" stroke-width="1" />
            <circle cx="44" cy="27.5" r="3" fill="#ffffff" />
          </g>
        </g>

        <!-- Column 2: Daftar Hadir Rekan -->
        <g transform="translate(128, 178)" filter="url(#shadow)">
          <rect width="110" height="152" rx="10" fill="#ffffff" />
          <text x="10" y="18" fill="#1e293b" font-family="'Inter', sans-serif" font-size="7.5" font-weight="900">Daftar Hadir Rekan</text>
          
          <!-- List item 1 -->
          <g transform="translate(10, 28)">
            <rect width="90" height="24" rx="5" fill="#f8fafc" stroke="#f1f5f9" stroke-width="1" />
            <circle cx="12" cy="12" r="7" fill="#3b82f6" />
            <text x="12" y="14.5" fill="#ffffff" font-family="sans-serif" font-size="6" font-weight="bold" text-anchor="middle">S</text>
            <text x="24" y="11" fill="#1e293b" font-family="'Inter', sans-serif" font-size="6.5" font-weight="bold">1. Ibu Sari</text>
            <text x="24" y="19" fill="#10b981" font-family="'Inter', sans-serif" font-size="6" font-weight="bold">07:15 (On Time)</text>
          </g>

          <!-- List item 2 -->
          <g transform="translate(10, 56)">
            <rect width="90" height="24" rx="5" fill="#f8fafc" stroke="#f1f5f9" stroke-width="1" />
            <circle cx="12" cy="12" r="7" fill="#f59e0b" />
            <text x="12" y="14.5" fill="#ffffff" font-family="sans-serif" font-size="6" font-weight="bold" text-anchor="middle">D</text>
            <text x="24" y="11" fill="#1e293b" font-family="'Inter', sans-serif" font-size="6.5" font-weight="bold">2. Pak Danu</text>
            <text x="24" y="19" fill="#10b981" font-family="'Inter', sans-serif" font-size="6" font-weight="bold">07:22 (On Time)</text>
          </g>

          <!-- List item 3 -->
          <g transform="translate(10, 84)">
            <rect width="90" height="24" rx="5" fill="#f8fafc" stroke="#f1f5f9" stroke-width="1" />
            <circle cx="12" cy="12" r="7" fill="#10b981" />
            <text x="12" y="14.5" fill="#ffffff" font-family="sans-serif" font-size="6" font-weight="bold" text-anchor="middle">A</text>
            <text x="24" y="11" fill="#1e293b" font-family="'Inter', sans-serif" font-size="6.5" font-weight="bold">3. Ibu Amelia</text>
            <text x="24" y="19" fill="#10b981" font-family="'Inter', sans-serif" font-size="6" font-weight="bold">07:28 (On Time)</text>
          </g>
          
          <text x="55" y="132" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" text-anchor="middle">Lihat Semua Rekan (100) →</text>
        </g>

        <!-- E. Phone Bottom Navigation Bar -->
        <rect y="399" width="248" height="40" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" />
        
        <!-- Navigation tab items -->
        <!-- Tab 1: Home -->
        <g transform="translate(25, 404)">
          <circle cx="0" cy="10" r="4" fill="none" stroke="#1e3a8a" stroke-width="1" />
          <path d="M -5 16 C -5 13 5 13 5 16 Z" fill="none" stroke="#1e3a8a" stroke-width="1" />
          <text x="0" y="26" fill="#1e3a8a" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" text-anchor="middle">Home</text>
        </g>
        
        <!-- Tab 2: Laporan -->
        <g transform="translate(85, 404)">
          <rect x="-5" y="4" width="10" height="12" rx="1" fill="none" stroke="#64748b" stroke-width="1" />
          <line x1="-2" y1="8" x2="2" y2="8" stroke="#64748b" stroke-width="1" />
          <line x1="-2" y1="12" x2="2" y2="12" stroke="#64748b" stroke-width="1" />
          <text x="0" y="26" fill="#64748b" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" text-anchor="middle">Laporan</text>
        </g>

        <!-- Tab 3: Statistik -->
        <g transform="translate(150, 404)">
          <line x1="-5" y1="16" x2="-5" y2="10" stroke="#64748b" stroke-width="2" />
          <line x1="0" y1="16" x2="0" y2="6" stroke="#64748b" stroke-width="2" />
          <line x1="5" y1="16" x2="5" y2="12" stroke="#64748b" stroke-width="2" />
          <text x="0" y="26" fill="#64748b" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" text-anchor="middle">Statistik</text>
        </g>

        <!-- Tab 4: Profil -->
        <g transform="translate(215, 404)">
          <circle cx="0" cy="9" r="3.5" fill="none" stroke="#64748b" stroke-width="1" />
          <path d="M -5 16 A 5 5 0 0 1 5 16" fill="none" stroke="#64748b" stroke-width="1" />
          <text x="0" y="26" fill="#64748b" font-family="'Inter', sans-serif" font-size="6" font-weight="bold" text-anchor="middle">Profil</text>
        </g>
        
        <!-- Home bar (iOS style) -->
        <rect x="89" y="432" width="70" height="3" rx="1.5" fill="#1e293b" />
      </g>
    </g>

    <!-- 5. Stylized hand holding the phone (overlapping paths) -->
    <g opacity="0.95" transform="translate(210, 180)">
      <!-- Palm part -->
      <path d="M 50 180 C 70 200 130 190 140 120 C 145 90 120 50 100 40 L 70 120 Z" fill="#fdba74" stroke="#e2e8f0" stroke-width="0.5" opacity="0.3" />
      
      <!-- Thumb wrapping phone -->
      <path d="M -60 40 C -40 40 -35 60 -50 72 C -65 82 -90 70 -90 60 C -90 50 -75 40 -60 40 Z" fill="#fed7aa" stroke="#1e293b" stroke-width="2" />
      <!-- Thumb nail -->
      <path d="M -52 48 C -48 48 -47 55 -52 57 C -55 58 -57 52 -52 48 Z" fill="#ffedd5" />

      <!-- Fingers wrapping from the back / right -->
      <!-- Index finger -->
      <path d="M 62 10 C 85 10 95 -10 110 -2 C 120 5 110 25 90 20 L 62 15 Z" fill="#fed7aa" stroke="#1e293b" stroke-width="2" />
      <!-- Middle finger -->
      <path d="M 64 45 C 92 45 102 25 115 32 C 125 40 115 58 92 55 L 64 50 Z" fill="#fdba74" stroke="#1e293b" stroke-width="2" />
      <!-- Ring finger -->
      <path d="M 64 80 C 90 80 100 62 112 68 C 122 75 112 92 90 90 L 64 85 Z" fill="#fdba74" stroke="#1e293b" stroke-width="2" />
      <!-- Pinky finger -->
      <path d="M 60 115 C 82 115 90 100 100 106 C 108 112 100 125 82 125 L 60 120 Z" fill="#e0a96d" stroke="#1e293b" stroke-width="2" />
    </g>
  </g>
</svg>
